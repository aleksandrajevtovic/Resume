@if (open) {
<div class="confirm-modal__backdrop" (click)="onBackdropClick()"></div>
<section class="confirm-modal__window" role="dialog" aria-modal="true">
  <article class="confirm-modal__card">
    <div class="confirm-modal__header">
      <h3>{{ title }}</h3>
      <button
        type="button"
        class="confirm-modal__icon-btn"
        (click)="onClose()"
        [disabled]="closeDisabled"
        [attr.aria-label]="'Close ' + title + ' dialog'"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M3.5 3.5L12.5 12.5M12.5 3.5L3.5 12.5" />
        </svg>
        <span class="confirm-modal__sr-only">Close</span>
      </button>
    </div>

    <div class="confirm-modal__danger">
      <strong>{{ warningTitle }}</strong>
      <span>{{ message }}</span>
    </div>

    <div class="confirm-modal__actions">
      <button type="button" class="confirm-modal__btn confirm-modal__btn--danger" (click)="onConfirm()" [disabled]="busy">
        {{ confirmLabel }}
      </button>
      <button
        type="button"
        class="confirm-modal__btn confirm-modal__btn--secondary"
        (click)="onClose()"
        [disabled]="closeDisabled"
      >
        {{ cancelLabel }}
      </button>
    </div>
  </article>
</section>
}
