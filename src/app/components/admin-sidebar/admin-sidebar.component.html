<aside class="admin-sidebar" [class.admin-sidebar--collapsed]="!expanded" aria-label="Admin side menu">
  <div class="admin-sidebar__top">
    <button
      type="button"
      class="admin-sidebar__toggle"
      (click)="onToggle()"
      [attr.aria-expanded]="expanded"
      aria-controls="admin-side-menu"
      [attr.aria-label]="expanded ? 'Collapse sidebar' : 'Expand sidebar'"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </svg>
      <span class="admin-sidebar__toggle-label">Menu</span>
    </button>
  </div>

  <nav id="admin-side-menu" class="admin-sidebar__nav">
    <a
      class="admin-sidebar__item"
      routerLink="/"
      [attr.data-tooltip]="!expanded ? 'Home' : null"
    >
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M4 11.5L12 5l8 6.5M7 10.5V19h10v-8.5" />
        </svg>
      </span>
      <span class="admin-sidebar__label">Home</span>
    </a>

    <button
      type="button"
      class="admin-sidebar__item admin-sidebar__item--button"
      (click)="onLogout()"
      [attr.data-tooltip]="!expanded ? 'Logout' : null"
    >
      <span class="admin-sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M10 5H6v14h4M14 8l4 4-4 4M9 12h9" />
        </svg>
      </span>
      <span class="admin-sidebar__label">Logout</span>
    </button>
  </nav>
</aside>
