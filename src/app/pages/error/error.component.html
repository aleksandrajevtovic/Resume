@if (isLoading) {
  <app-preloader></app-preloader>
}

<div class="error-shell" [class.error-shell--ready]="!isLoading">
  <app-navigation [errorMode]="true"></app-navigation>

  <main class="error-page" aria-labelledby="error-title">
    <app-ambient-shapes [errorMode]="true"></app-ambient-shapes>

    <div class="error-card">
      <p class="error-eyebrow">404</p>
      <h1 id="error-title" class="error-title error-title--glitch" data-text="Page not found">
        Page not found
      </h1>
      <p class="error-copy">
        The page you requested does not exist or has been moved.
      </p>
      <div class="error-actions">
        <a routerLink="/" class="error-btn error-btn--glitch" data-text="Return home">Return home</a>
      </div>
    </div>
  </main>
</div>
