[build]
  command = "npm run build"
  publish = "dist/portfolio/browser"

[[redirects]]
  from = "/api/*"
  to = "https://your-render-service.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://your-render-service.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
